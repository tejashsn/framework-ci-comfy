name: 'Prepare CI Shell'
description: 'Git Bash on Windows self-hosted runners; resolve a usable Python for CI steps'

runs:
  using: 'composite'
  steps:
    - name: Prepare PATH and Python (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $gitBin = 'C:\Program Files\Git\bin'
        $gitUsr = 'C:\Program Files\Git\usr\bin'
        $add = @()
        if (Test-Path $gitBin) { $add += $gitBin }
        if (Test-Path $gitUsr) { $add += $gitUsr }
        if ($add.Count -gt 0) {
          # GITHUB_PATH prepends for subsequent steps (including composite shell: bash lookup).
          foreach ($dir in $add) {
            $dir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          }
        }

        $py = $env:COMFYUI_PYTHON
        if (-not $py -or -not (Test-Path $py)) {
          $py = (Get-Command python -ErrorAction SilentlyContinue).Source
        }
        if ($py) {
          "CI_PYTHON=$py" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Using CI Python: $py"
          & $py --version
        } else {
          Write-Host "::warning::No python on PATH after CI shell prep"
        }

    - name: Prepare PATH and Python (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euo pipefail

        PY=""
        if [[ -n "${COMFYUI_PYTHON:-}" ]] && { [[ -x "${COMFYUI_PYTHON}" ]] || [[ -f "${COMFYUI_PYTHON}" ]]; }; then
          PY="${COMFYUI_PYTHON}"
        else
          PY="$(command -v python3 2>/dev/null || command -v python 2>/dev/null || true)"
        fi

        if [[ -z "$PY" ]]; then
          echo "::warning::No python/python3 on PATH after CI shell prep"
        else
          echo "CI_PYTHON=$PY" >> "$GITHUB_ENV"
          echo "Using CI Python: $PY ($($PY --version 2>&1))"
        fi
