name: 'Setup Test Environment'
description: 'Common setup for all test workflows - installs dependencies and configures environment'
inputs:
  python-version:
    description: 'Python version to use (3.x = any available Python 3)'
    required: false
    default: '3.x'
  gpu-family:
    description: 'GPU family name'
    required: false
    default: ''
  execution-label:
    description: 'Execution label (nightly, smoke, etc.)'
    required: false
    default: 'ci'

runs:
  using: 'composite'
  steps:
    # Self-hosted Windows runners use COMFYUI_PYTHON / CI_PYTHON from prepare-ci-shell.
    # setup-python tries to install Python and often fails on registry permissions.
    - name: Set up Python
      if: runner.os != 'Windows'
      id: setup-python
      uses: actions/setup-python@v5
      continue-on-error: true
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Verify Python available
      shell: bash
      run: |
        set -euo pipefail

        resolve_py() {
          if [ -n "${CI_PYTHON:-}" ] && { [ -x "${CI_PYTHON}" ] || [ -f "${CI_PYTHON}" ]; }; then
            echo "${CI_PYTHON}"
            return 0
          fi
          if [ -n "${COMFYUI_PYTHON:-}" ] && { [ -x "${COMFYUI_PYTHON}" ] || [ -f "${COMFYUI_PYTHON}" ]; }; then
            echo "${COMFYUI_PYTHON}"
            return 0
          fi
          # On Windows Git Bash, python3 is often the Microsoft Store stub.
          if command -v python &>/dev/null; then
            command -v python
            return 0
          fi
          command -v python3 2>/dev/null || true
        }

        if [ "${{ steps.setup-python.outcome }}" = "failure" ]; then
          echo "::warning::setup-python failed to provision Python '${{ inputs.python-version }}'; falling back to system Python."
        fi

        PY="$(resolve_py)"
        if [ -z "$PY" ]; then
          echo "::error::No Python found. Set comfyui_python workflow input or install python on the runner."
          exit 1
        fi

        echo "CI_PYTHON=$PY" >> "$GITHUB_ENV"
        echo "Using: $PY ($($PY --version 2>&1))"

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail

        PY="${CI_PYTHON:-${COMFYUI_PYTHON:-$(command -v python || command -v python3)}}"
        "$PY" -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          "$PY" -m pip install -r requirements.txt
        fi

    - name: Set environment variables
      shell: bash
      run: |
        echo "GPU_FAMILY=${{ inputs.gpu-family }}" >> $GITHUB_ENV
        echo "EXECUTION_LABEL=${{ inputs.execution-label }}" >> $GITHUB_ENV
        echo "OS=${{ runner.os }}" >> $GITHUB_ENV
        echo "CI=true" >> $GITHUB_ENV
