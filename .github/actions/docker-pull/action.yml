# Composite action to pull Docker image with sudo detection
#
# Usage:
#   - uses: ./.github/actions/docker-pull
#     with:
#       image: 'rocm/vllm:latest'

name: 'Docker Pull'
description: 'Pull Docker image with automatic sudo detection'

inputs:
  image:
    description: 'Docker image to pull'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Pull Docker image
      shell: bash
      run: |
        # Helper: run docker with or without sudo
        run_docker() {
          if docker info >/dev/null 2>&1; then
            docker "$@"
          else
            sudo docker "$@"
          fi
        }
        
        echo ""
        echo "============================================================"
        echo "[CMD] Docker Pull"
        echo "[CMD] Image: ${{ inputs.image }}"
        echo "============================================================"
        echo ""
        run_docker pull ${{ inputs.image }}
