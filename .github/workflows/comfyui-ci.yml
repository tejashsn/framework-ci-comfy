# ComfyUI Validation Workflow (framework-ci suite pattern)
#
# Mirrors the fleet's vLLM/xDiT 4-job structure: setup -> benchmark -> consolidate
# -> summary. Runs the ComfyUI validation suite on AMD GPUs via self-hosted
# runners, in a ROCm container, and records results in the framework-ci shape.
#
# The composite actions referenced here (provision-runtime, capture-host-info,
# docker-pull/cleanup, upload-to-artifactory, upload-artifacts, fix-permissions)
# are the FLEET's actions — this repo carries none of its own. To run inside the
# frameworks-qa-ci repo, this file drops in unchanged. Standalone, wire the
# actions or use comfyui_benchmark.py --docker-image directly.

name: ComfyUI Validation

on:
  workflow_dispatch:
    inputs:
      model_names:
        description: 'Test names (comma-separated) or P0/P1/ALL. Default: P0'
        required: false
        default: 'P0'
      runner_label:
        description: 'Runner labels (comma-separated), e.g. "gfx942,gfx950"'
        required: false
        default: 'self-hosted'
      docker_image:
        description: 'ComfyUI ROCm image'
        required: false
        default: 'rocm/pytorch:latest'
      rocm_version:
        description: 'ROCm build under test (e.g. 7.15.0)'
        required: false
        default: ''
      comfyui_url:
        description: 'ComfyUI server URL inside the container'
        required: false
        default: 'http://127.0.0.1:8188'
      execution_label:
        description: 'Execution label for tracking'
        required: false
        default: 'manual'
      upload_results:
        description: 'Upload results to database (RASTRA)'
        type: boolean
        default: false
      upload_to_artifactory:
        description: 'Upload logs to Artifactory'
        type: boolean
        default: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: 1

jobs:
  # ==================== SETUP ====================
  setup:
    name: "Setup"
    runs-on: [self-hosted]
    outputs:
      models: ${{ steps.parse.outputs.models }}
      model_count: ${{ steps.parse.outputs.model_count }}
      runner_labels: ${{ steps.parse.outputs.runner_labels }}
      upload_results: ${{ inputs.upload_results }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse inputs
        id: parse
        run: |
          python3 tests/src/inference/comfyui/scripts/create_config.py \
            --parse-inputs \
            --models "${{ inputs.model_names || 'P0' }}" \
            --runner-label "${{ inputs.runner_label || 'self-hosted' }}" \
            --config-file tests/src/inference/comfyui/config/models_config.yaml \
            --output-file "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## ComfyUI Validation Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Selection | \`${{ inputs.model_names || 'P0' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner labels | \`${{ steps.parse.outputs.runner_labels }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker image | \`${{ inputs.docker_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ROCm | \`${{ inputs.rocm_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Execution label | \`${{ inputs.execution_label || 'manual' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Test count | ${{ steps.parse.outputs.model_count }} |" >> $GITHUB_STEP_SUMMARY

  # ==================== BENCHMARK ====================
  benchmark:
    name: "${{ matrix.runner_label }} / ${{ matrix.model }}"
    needs: setup
    runs-on: [self-hosted, '${{ matrix.runner_label }}']
    timeout-minutes: 1080
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.setup.outputs.models) }}
        runner_label: ${{ fromJson(needs.setup.outputs.runner_labels) }}
    env:
      EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}
      CI: true
      DATABASE_UPLOAD_RESULTS: ${{ needs.setup.outputs.upload_results }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      COMFYUI_MODEL_NAME: ${{ matrix.model }}
      DOCKER_IMAGE: ${{ inputs.docker_image }}
      UPLOAD_TO_ARTIFACTORY: ${{ inputs.upload_to_artifactory || false }}
      DOCKER_GPU_FLAGS: "--network=host --device=/dev/kfd --device=/dev/dri --group-add video --ipc=host --cap-add=SYS_PTRACE --security-opt seccomp=unconfined --shm-size=16g -v /sys:/sys:ro"
    steps:
      - name: Clean workspace
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE" 2>/dev/null || \
              sudo -n chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          rm -rf $GITHUB_WORKSPACE/logs 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      # FLEET ACTION: provisions the ROCm container (or baremetal venv), captures
      # host+container info. Standalone, comfyui_benchmark.py --docker-image does
      # the equivalent container launch.
      - name: Provision runtime
        uses: ./.github/actions/provision-runtime
        with:
          execution_env: docker
          docker_image: ${{ env.DOCKER_IMAGE }}
          container_name: comfyui-${{ github.run_id }}
          working_directory: .

      - name: Capture host config
        uses: ./.github/actions/capture-host-info

      - name: Pull image
        uses: ./.github/actions/docker-pull
        with:
          image: ${{ env.DOCKER_IMAGE }}

      - name: Run ComfyUI validation
        run: |
          run_docker() { if docker info >/dev/null 2>&1; then docker "$@"; else sudo docker "$@"; fi; }
          HOST_UID=$(id -u); HOST_GID=$(id -g)
          mkdir -p logs/benchmark_results
          # The suite entry drives the hardened executor against the ComfyUI
          # server inside the container and writes results_<test>.json.
          CMD="pip install -r requirements.txt >/dev/null 2>&1 || true; \
            python3 tests/src/inference/comfyui/comfyui_benchmark.py \
              --model '${{ matrix.model }}' \
              --rocm-version '${{ inputs.rocm_version }}' \
              --comfyui-url '${{ inputs.comfyui_url }}' \
              --execution-label '${EXECUTION_LABEL}' \
              --results-dir logs/benchmark_results; \
            EXIT=\$?; chown -R ${HOST_UID}:${HOST_GID} /workspace 2>/dev/null || true; exit \$EXIT"
          run_docker run --rm --entrypoint /bin/bash $DOCKER_GPU_FLAGS \
            -e "HF_TOKEN=${HF_TOKEN}" -e PYTHONUNBUFFERED=1 -e CI \
            -e "EXECUTION_LABEL=${EXECUTION_LABEL}" \
            -e "COMFYUI_IN_CONTAINER=1" \
            -v $(pwd):/workspace -w /workspace \
            "$DOCKER_IMAGE" -c "$CMD" 2>&1 | tee logs/console_output.log
          echo "BENCHMARK_EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: Cleanup
        if: always()
        uses: ./.github/actions/docker-cleanup
        with:
          image: ${{ env.DOCKER_IMAGE }}

      - name: Generate summary
        if: always()
        run: python3 tests/src/inference/comfyui/scripts/generate_summary.py --mode github

      - name: Upload results to database
        if: always() && needs.setup.outputs.upload_results == 'true'
        env:
          API_URL: ${{ vars.RASTRA_API_URL }}
          API_KEY: ${{ secrets.RASTRA_API_KEY }}
          EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}
        run: |
          pip install -q requests jsonschema packaging pyyaml
          python3 tests/src/inference/comfyui/scripts/upload_from_artifacts.py \
            --results-dir logs/benchmark_results \
            --execution-label "$EXECUTION_LABEL" \
            || echo "DB upload skipped or failed (non-critical)"

      - name: Upload to Artifactory
        if: always() && env.UPLOAD_TO_ARTIFACTORY == 'true'
        uses: ./.github/actions/upload-to-artifactory
        with:
          source_path: logs/
          framework: comfyui
          test_name: comfyui_${{ matrix.model }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}
          enabled: ${{ env.UPLOAD_TO_ARTIFACTORY }}

      - name: Upload artifacts
        if: always()
        uses: ./.github/actions/upload-artifacts
        with:
          name_prefix: 'results'
          runner_label: ${{ matrix.runner_label }}
          model_slug: ${{ matrix.model }}

      - name: Fix permissions
        if: always()
        uses: ./.github/actions/fix-permissions
        with:
          paths: '${{ github.workspace }}'

  # ==================== CONSOLIDATE ====================
  consolidate:
    name: "Consolidate"
    needs: [setup, benchmark]
    runs-on: [self-hosted]
    container: python:3.11-slim
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install deps
        run: pip install -q prettytable pyyaml requests jsonschema packaging
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_results
          pattern: results__*
      - name: Consolidate results
        run: |
          python3 -m tests.utils.consolidation.config_consolidator \
            --config tests/src/inference/comfyui/config/consolidation.yaml \
            --results-dir all_results \
            --fail-on-error || echo "consolidation reported failures"
      - name: Add to summary
        if: always()
        run: |
          [ -f results_summary.md ] && cat results_summary.md >> $GITHUB_STEP_SUMMARY || \
            echo "## No results to consolidate" >> $GITHUB_STEP_SUMMARY

  # ==================== SUMMARY ====================
  summary:
    name: "Done"
    needs: [setup, benchmark, consolidate]
    runs-on: [self-hosted]
    if: always()
    steps:
      - name: Final
        run: |
          echo "## ComfyUI Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "Download \`results__*\` artifacts for full evidence." >> $GITHUB_STEP_SUMMARY
