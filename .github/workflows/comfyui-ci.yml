# ComfyUI Validation Workflow
# Runs ComfyUI GPU validation on AMD GPUs via self-hosted runners (bare metal).
#
# No Docker required: ComfyUI must already be running on the runner host
# (default http://127.0.0.1:8188). Model weights live under COMFYUI_PATH/models/.
#
# Triggers:
#   - Manual (workflow_dispatch)
#   - workflow_call (fleet orchestrators)
#
# Jobs: setup -> benchmark (matrix) -> consolidate -> summary

name: ComfyUI Validation

on:
  workflow_dispatch:
    inputs:
      model_names:
        description: 'Test names (comma-separated) or P0/P1/ALL. Default: P0'
        required: false
        default: 'P0'
      runner_label:
        description: 'Runner labels (comma-separated for multi-arch, e.g., "gfx908,gfx942")'
        required: false
        default: 'self-hosted'
      rocm_version:
        description: 'ROCm build under test (e.g. 7.15.0). Auto-detected from /etc/rocm_metadata.conf if empty.'
        required: false
        default: ''
      comfyui_url:
        description: 'ComfyUI server URL on the runner host'
        required: false
        default: 'http://127.0.0.1:8188'
      comfyui_path:
        description: 'ComfyUI install dir (contains models/). Falls back to $COMFYUI_PATH on runner.'
        required: false
        default: ''
      comfyui_python:
        description: 'Python with ROCm torch (ComfyUI venv). Default: python3 on PATH.'
        required: false
        default: ''
      execution_label:
        description: 'Execution label for tracking'
        required: false
        default: 'manual'
      upload_results:
        description: 'Upload results to database (RASTRA)'
        type: boolean
        default: true
      upload_to_artifactory:
        description: 'Upload logs to Artifactory'
        type: boolean
        default: true

  workflow_call:
    inputs:
      model_names:
        type: string
        default: 'P0'
      runner_label:
        type: string
        default: 'self-hosted'
      rocm_version:
        type: string
        default: ''
      comfyui_url:
        type: string
        default: 'http://127.0.0.1:8188'
      comfyui_path:
        type: string
        default: ''
      comfyui_python:
        type: string
        default: ''
      execution_label:
        type: string
        required: true
      upload_results:
        type: boolean
        default: true
      upload_to_artifactory:
        type: boolean
        default: true
    secrets:
      HF_TOKEN:
        required: false
      RASTRA_API_KEY:
        required: false
      ARTIFACTORY_USER:
        required: false
      ARTIFACTORY_PASSWORD:
        required: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: 1

jobs:
  # ==================== SETUP ====================
  setup:
    name: "Setup"
    runs-on: [self-hosted]
    outputs:
      models: ${{ steps.parse.outputs.models }}
      model_count: ${{ steps.parse.outputs.model_count }}
      trigger_type: ${{ steps.parse.outputs.trigger_type }}
      runner_labels: ${{ steps.parse.outputs.runner_labels }}
      runner_label_count: ${{ steps.parse.outputs.runner_label_count }}
      upload_results: ${{ steps.parse.outputs.upload_results }}

    steps:
      - name: Fix permissions
        run: |
          chown -R $(whoami):$(whoami) $GITHUB_WORKSPACE 2>/dev/null || \
            sudo -n chown -R $(whoami):$(whoami) $GITHUB_WORKSPACE 2>/dev/null || true
          chmod -R u+rwX $GITHUB_WORKSPACE 2>/dev/null || \
            sudo -n chmod -R u+rwX $GITHUB_WORKSPACE 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse inputs
        id: parse
        run: |
          python3 tests/src/inference/comfyui/scripts/create_config.py \
            --parse-inputs \
            --trigger "${{ github.event_name }}" \
            --models "${{ inputs.model_names || 'P0' }}" \
            --runner-label "${{ inputs.runner_label || 'self-hosted' }}" \
            --upload "${{ inputs.upload_results }}" \
            --config-file tests/src/inference/comfyui/config/models_config.yaml \
            --output-file "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## ComfyUI Validation Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trigger & Execution" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ steps.parse.outputs.trigger_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | \`baremetal\` (no Docker) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner Labels** | \`${{ steps.parse.outputs.runner_labels }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ComfyUI URL** | \`${{ inputs.comfyui_url || 'http://127.0.0.1:8188' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ComfyUI Path** | \`${{ inputs.comfyui_path || '$COMFYUI_PATH on runner' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ROCm Version** | \`${{ inputs.rocm_version || '(auto)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Label** | \`${{ inputs.execution_label || 'manual' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Upload to DB** | \`${{ steps.parse.outputs.upload_results }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Upload to Artifactory** | \`${{ inputs.upload_to_artifactory }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Jobs** | ${{ steps.parse.outputs.model_count }} tests × ${{ steps.parse.outputs.runner_label_count }} labels |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Models (${{ steps.parse.outputs.model_count }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Input:** \`${{ inputs.model_names || 'P0' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Selected Tests:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.parse.outputs.models }}' | python3 -c "import json,sys; [print(f'- \`{m}\`') for m in json.load(sys.stdin)]" >> $GITHUB_STEP_SUMMARY

  # ==================== BENCHMARK ====================
  benchmark:
    name: "${{ matrix.runner_label }} / ${{ matrix.model }}"
    needs: setup
    runs-on: [self-hosted, '${{ matrix.runner_label }}']
    timeout-minutes: 1080

    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.setup.outputs.models) }}
        runner_label: ${{ fromJson(needs.setup.outputs.runner_labels) }}

    env:
      GPU_FAMILY: ${{ vars.GPU_FAMILY || '' }}
      EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}
      CI: true
      DATABASE_UPLOAD_RESULTS: ${{ needs.setup.outputs.upload_results }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      AUTO_FETCH_MODELS: "true"
      COMFYUI_PREFER_ARTIFACTORY: "true"
      ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL || 'https://compute-artifactory.amd.com' }}
      COMFYUI_MODELS_ARTIFACTORY_REPO: ${{ vars.COMFYUI_MODELS_ARTIFACTORY_REPO || 'artifactory/rocm-qa-model-cache/comfyui' }}
      ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
      ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
      COMFYUI_MODEL_NAME: ${{ matrix.model }}
      COMFYUI_PATH: ${{ inputs.comfyui_path || vars.COMFYUI_PATH || '' }}
      COMFYUI_PYTHON: ${{ inputs.comfyui_python || vars.COMFYUI_PYTHON || '' }}
      UPLOAD_TO_ARTIFACTORY: ${{ inputs.upload_to_artifactory || false }}

    steps:
      - name: Clean workspace
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE" 2>/dev/null || \
              sudo -n chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE" 2>/dev/null || true
            chmod -R u+rwX "$GITHUB_WORKSPACE" 2>/dev/null || \
              sudo -n chmod -R u+rwX "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          rm -rf $GITHUB_WORKSPACE/logs $GITHUB_WORKSPACE/results 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup test environment
        uses: ./.github/actions/setup-test-environment
        with:
          python-version: '3.x'
          gpu-family: ${{ vars.GPU_FAMILY || '' }}
          execution-label: ${{ env.EXECUTION_LABEL }}

      - name: Capture host config
        uses: ./.github/actions/capture-host-info

      # Same ROCm env bootstrap as qa-forge rocm-func-core-therock-install.yml
      # (load-rocm-from-metadata + setup-rocm-env after install).
      - name: Setup ROCm environment
        uses: ./.github/actions/setup-rocm-env
        with:
          enable-rocm-path: 'true'
          enable-ld-library-path: 'true'
          enable-hip-platform: 'true'

      - name: Detect ROCm version
        id: rocm_detect
        run: |
          set -euo pipefail
          ROCM_VER="${{ inputs.rocm_version }}"

          # Primary: /etc/rocm_metadata.conf written by ROCmTest/TheRock install
          if [ -z "$ROCM_VER" ] && [ -f /etc/rocm_metadata.conf ]; then
            INSTALLED=$(grep -E '^INSTALLED_VERSION\s*=' /etc/rocm_metadata.conf \
              | sed 's/^INSTALLED_VERSION\s*=\s*//' | tr -d ' ' || true)
            if [ -n "$INSTALLED" ]; then
              ROCM_VER="${INSTALLED%%-*}"
              echo "ROCm version from /etc/rocm_metadata.conf: $ROCM_VER (full: $INSTALLED)"
            fi
            GFX_TARGET=$(grep -E '^INSTALLED_GFX_TARGET\s*=' /etc/rocm_metadata.conf \
              | sed 's/^INSTALLED_GFX_TARGET\s*=\s*//' | tr -d ' ' || true)
            if [ -n "$GFX_TARGET" ]; then
              echo "INSTALLED_GFX_TARGET=$GFX_TARGET" >> "$GITHUB_ENV"
            fi
          fi

          # Fallback: host capture (logs/bm_config.json from capture-host-info)
          if { [ -z "$ROCM_VER" ] || [ "$ROCM_VER" = "Unknown" ]; } && [ -f logs/bm_config.json ]; then
            ROCM_VER=$(python3 -c "import json; d=json.load(open('logs/bm_config.json')); print((d.get('rocm_version') or '').strip())" 2>/dev/null || true)
            [ -n "$ROCM_VER" ] && echo "ROCm version from logs/bm_config.json: $ROCM_VER"
          fi

          # Fallback: fleet ROCmDetector ($ROCM_PATH/.info/version-rocm, amd-smi, rocminfo)
          if [ -z "$ROCM_VER" ] || [ "$ROCM_VER" = "Unknown" ]; then
            ROCM_VER=$(python3 -c "
          from tests.utils.system.rocm_detector import ROCmDetector
          v = ROCmDetector._detect_rocm_version() or ''
          print(v.split('-')[0] if v else '')
          " 2>/dev/null || true)
            [ -n "$ROCM_VER" ] && echo "ROCm version from ROCmDetector: $ROCM_VER"
          fi

          if [ -z "$ROCM_VER" ]; then
            echo "::warning::Could not detect ROCm version; using 'unknown'"
            ROCM_VER="unknown"
          fi

          echo "rocm_version=$ROCM_VER" >> "$GITHUB_OUTPUT"
          echo "ROCM_VERSION=$ROCM_VER" >> "$GITHUB_ENV"

      - name: Job info
        id: info
        uses: ./.github/actions/job-info
        with:
          model: ${{ matrix.model }}
          runner_label: ${{ matrix.runner_label }}
          execution_mode: baremetal

      - name: Check arch compatibility
        id: arch_check
        run: |
          python3 tests/src/inference/comfyui/scripts/create_config.py \
            --check-arch-only \
            --model "${{ matrix.model }}" \
            --config-file tests/src/inference/comfyui/config/models_config.yaml \
            --output-file "$GITHUB_OUTPUT"

      - name: Skip - Arch not supported
        if: steps.arch_check.outputs.supported == 'false'
        run: |
          echo "## ⏭️ SKIPPED - Not Supported" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Test** | \`${{ matrix.model }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **GPU Arch** | \`${{ steps.arch_check.outputs.gpu_arch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | ${{ steps.arch_check.outputs.skip_reason }} |" >> $GITHUB_STEP_SUMMARY
          mkdir -p logs/benchmark_results
          echo '{"status": "skipped", "reason": "${{ steps.arch_check.outputs.skip_reason }}", "model": "${{ matrix.model }}", "gpu_arch": "${{ steps.arch_check.outputs.gpu_arch }}"}' > logs/benchmark_results/skipped.json
          echo "::warning::SKIPPED: ${{ matrix.model }} - ${{ steps.arch_check.outputs.skip_reason }}"

      - name: Run ComfyUI validation
        if: steps.arch_check.outputs.supported == 'true'
        run: |
          set -euo pipefail
          mkdir -p logs/benchmark_results

          PY="${COMFYUI_PYTHON:-${{ inputs.comfyui_python || vars.COMFYUI_PYTHON || '' }}}"
          PY="${PY:-python3}"
          if [ -z "${COMFYUI_PATH:-}" ] && [ -d /home/master/ComfyUI ]; then
            echo "COMFYUI_PATH=/home/master/ComfyUI" >> "$GITHUB_ENV"
          fi
          if [ "$PY" = "python3" ] && [ -x /home/master/comfyui-host-venv/bin/python ]; then
            PY=/home/master/comfyui-host-venv/bin/python
            echo "Using discovered ComfyUI venv Python: $PY"
          fi
          echo "Using Python: $($PY --version 2>&1)"
          echo "ComfyUI path: ${COMFYUI_PATH:-'(from runner env/discovery)'}"
          echo "ComfyUI URL: ${{ inputs.comfyui_url }}"

          "$PY" -m pip install -q -r requirements.txt

          ARCH_ARGS=()
          GPU_ARCH='${{ steps.arch_check.outputs.gpu_arch }}'
          if [ -z "$GPU_ARCH" ] || [ "$GPU_ARCH" = "unknown" ]; then
            GPU_ARCH="${INSTALLED_GFX_TARGET:-}"
          fi
          if [ -n "$GPU_ARCH" ] && [ "$GPU_ARCH" != "unknown" ]; then
            ARCH_ARGS=(--arch "$GPU_ARCH")
            echo "Using GPU arch: $GPU_ARCH"
          fi

          ROCM_VER='${{ steps.rocm_detect.outputs.rocm_version }}'
          echo "Using ROCm version: $ROCM_VER"

          set +e
          "$PY" tests/src/inference/comfyui/comfyui_benchmark.py \
            --model '${{ matrix.model }}' \
            --rocm-version "$ROCM_VER" \
            --comfyui-url '${{ inputs.comfyui_url }}' \
            --execution-label "${EXECUTION_LABEL}" \
            --results-dir logs/benchmark_results \
            "${ARCH_ARGS[@]}" \
            2>&1 | tee logs/console_output.log
          BENCHMARK_EXIT=${PIPESTATUS[0]}
          set -e

          # Runtime env snapshot (ComfyUI venv / host Python) for RASTRA payload.
          "$PY" scripts/capture_system_info.py \
            --output logs/container_info.json --packages --pip-list 2>/dev/null || \
            python3 scripts/capture_system_info.py \
            --output logs/container_info.json --packages --pip-list 2>/dev/null || true

          echo "BENCHMARK_EXIT_CODE=$BENCHMARK_EXIT" >> "$GITHUB_ENV"
          exit $BENCHMARK_EXIT

      - name: Generate model summary
        if: always()
        run: python3 tests/src/inference/comfyui/scripts/generate_summary.py --mode github
        env:
          RUNNER_HOSTNAME: ${{ env.RUNNER_HOST }}
          COMFYUI_MODEL_NAME: ${{ matrix.model }}

      - name: Upload results to database
        if: always() && steps.arch_check.outputs.supported == 'true' && needs.setup.outputs.upload_results == 'true'
        env:
          API_URL: ${{ vars.RASTRA_API_URL }}
          API_KEY: ${{ secrets.RASTRA_API_KEY }}
          EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}
          RUNNER_HOSTNAME: ${{ env.RUNNER_HOST }}
          GITHUB_ACTOR: ${{ github.actor }}
          COMFYUI_MODEL_NAME: ${{ matrix.model }}
          BENCHMARK_EXIT_CODE: ${{ env.BENCHMARK_EXIT_CODE }}
          ROCM_VERSION: ${{ steps.rocm_detect.outputs.rocm_version }}
        run: |
          pip install -q requests jsonschema packaging pyyaml
          python3 tests/src/inference/comfyui/scripts/upload_from_artifacts.py \
            --results-dir logs/benchmark_results \
            --execution-label "$EXECUTION_LABEL" \
            || echo "DB upload skipped or failed (non-critical)"

      - name: Upload to Artifactory
        if: always() && env.UPLOAD_TO_ARTIFACTORY == 'true'
        uses: ./.github/actions/upload-to-artifactory
        with:
          source_path: logs/
          framework: comfyui
          test_name: ${{ matrix.model }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}
          enabled: ${{ env.UPLOAD_TO_ARTIFACTORY }}

      - name: Upload artifacts
        if: always()
        uses: ./.github/actions/upload-artifacts
        with:
          name_prefix: 'results'
          runner_label: ${{ matrix.runner_label }}
          model_slug: ${{ env.MODEL_SLUG }}

      - name: Fix permissions
        if: always()
        uses: ./.github/actions/fix-permissions
        with:
          paths: '${{ github.workspace }}'

  # ==================== CONSOLIDATE ====================
  consolidate:
    name: "Consolidate"
    needs: [setup, benchmark]
    runs-on: [self-hosted]
    if: always()

    env:
      EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: pip install -q prettytable pyyaml requests jsonschema packaging

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_results
          pattern: results__*

      - name: Consolidate results
        id: consolidate
        run: |
          python3 tests/src/inference/comfyui/scripts/consolidate_artifacts.py \
            --results-dir all_results \
            --output results_summary.md \
            --fail-on-error

      - name: Add to summary
        if: always()
        run: |
          if [ -f "results_summary.md" ]; then
            cat results_summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## No results to consolidate" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results to database
        if: needs.setup.outputs.upload_results == 'true'
        env:
          API_URL: ${{ vars.RASTRA_API_URL }}
          API_KEY: ${{ secrets.RASTRA_API_KEY }}
          EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          python3 tests/src/inference/comfyui/scripts/upload_from_artifacts.py \
            --results-dir all_results \
            --execution-label "$EXECUTION_LABEL" \
            --save-payload fallback_payload.json \
            || echo "Fallback DB upload skipped or failed (non-critical)"

      - name: Generate RASTRA link
        if: always()
        run: |
          PAYLOAD=$(find all_results -name "payload.json" -type f | head -1)
          if [ -z "$PAYLOAD" ] && [ -f "fallback_payload.json" ]; then
            PAYLOAD="fallback_payload.json"
          fi
          if [ -n "$PAYLOAD" ]; then
            python3 tests/utils/results/rastra_link.py \
              --from-payload "$PAYLOAD" \
              --append-summary \
              --title "View Results in RASTRA Dashboard"
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "**RASTRA Link:** Not available (DB upload disabled or no results)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload consolidated
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-${{ github.run_id }}
          path: |
            results_summary.md
            fallback_payload.json
          retention-days: 90

  # ==================== SUMMARY ====================
  summary:
    name: "Done"
    needs: [setup, benchmark, consolidate]
    runs-on: [self-hosted]
    if: always()

    steps:
      - name: Final
        run: |
          echo "## ComfyUI Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download \`consolidated-${{ github.run_id }}\` artifact for full results." >> $GITHUB_STEP_SUMMARY
