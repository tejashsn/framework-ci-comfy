# ComfyUI Validation Workflow
# Runs ComfyUI GPU validation on AMD GPUs via self-hosted runners (bare metal).
#
# ComfyUI is auto-discovered, cloned if missing, and started on every runner
# (Linux and Windows; default http://127.0.0.1:8188). Model weights live under
# COMFYUI_PATH/models/. Autostart is on by default on all platforms; set
# COMFYUI_NO_AUTOSTART=1 or COMFYUI_NO_BOOTSTRAP=1 only to opt out.
#
# Triggers:
#   - Manual (workflow_dispatch)
#   - workflow_call (fleet orchestrators)
#
# Jobs: setup -> verify-environment (per runner) -> prefetch -> benchmark -> consolidate -> summary

name: ComfyUI Validation

on:
  workflow_dispatch:
    inputs:
      model_names:
        description: 'Comma-separated test names (manifest test_name values), e.g. comfyui_stable_diffusion_2_1,comfyui_flux1_dev'
        required: false
        default: 'comfyui_stable_diffusion_2_1,comfyui_stable_diffusion_xl_base_1.0'
      runner_label:
        description: 'Runner labels (comma-separated for multi-arch, e.g., "gfx908,gfx942")'
        required: false
        default: 'self-hosted'
      rocm_version:
        description: 'ROCm build under test (e.g. 7.15.0). Auto-detected from rocm metadata if empty.'
        required: false
        default: ''
      comfyui_url:
        description: 'ComfyUI server URL on the runner host'
        required: false
        default: 'http://127.0.0.1:8188'
      comfyui_path:
        description: 'ComfyUI install dir (contains models/). Falls back to $COMFYUI_PATH on runner.'
        required: false
        default: ''
      comfyui_python:
        description: 'Python with ROCm torch (ComfyUI venv). Default: python3 on PATH.'
        required: false
        default: ''
      execution_label:
        description: 'Execution label for tracking'
        required: false
        default: 'manual'
      upload_results:
        description: 'Upload results to database (RASTRA)'
        type: boolean
        default: true
      upload_to_artifactory:
        description: 'Upload logs to Artifactory'
        type: boolean
        default: true
      torch_wheel_url:
        description: 'Expected PyTorch wheel URL (for env verification; version parsed from filename)'
        required: false
        default: ''
      torchvision_wheel_url:
        description: 'Expected torchvision wheel URL (for env verification)'
        required: false
        default: ''
      torchaudio_wheel_url:
        description: 'Expected torchaudio wheel URL (for env verification)'
        required: false
        default: ''

  workflow_call:
    inputs:
      model_names:
        type: string
        default: 'comfyui_stable_diffusion_2_1,comfyui_stable_diffusion_xl_base_1.0'
      runner_label:
        type: string
        default: 'self-hosted'
      rocm_version:
        type: string
        default: ''
      comfyui_url:
        type: string
        default: 'http://127.0.0.1:8188'
      comfyui_path:
        type: string
        default: ''
      comfyui_python:
        type: string
        default: ''
      execution_label:
        type: string
        required: true
      upload_results:
        type: boolean
        default: true
      upload_to_artifactory:
        type: boolean
        default: true
      torch_wheel_url:
        type: string
        default: ''
      torchvision_wheel_url:
        type: string
        default: ''
      torchaudio_wheel_url:
        type: string
        default: ''
    secrets:
      HF_TOKEN:
        required: false
      RASTRA_API_KEY:
        required: false
      ARTIFACTORY_USER:
        required: false
      ARTIFACTORY_PASSWORD:
        required: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: 1

defaults:
  run:
    shell: bash

jobs:
  # ==================== SETUP ====================
  setup:
    name: "Setup"
    runs-on: [self-hosted]
    outputs:
      models: ${{ steps.parse.outputs.models }}
      model_count: ${{ steps.parse.outputs.model_count }}
      trigger_type: ${{ steps.parse.outputs.trigger_type }}
      runner_labels: ${{ steps.parse.outputs.runner_labels }}
      runner_label_count: ${{ steps.parse.outputs.runner_label_count }}
      upload_results: ${{ steps.parse.outputs.upload_results }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI shell
        uses: ./.github/actions/prepare-ci-shell

      - name: Fix permissions
        uses: ./.github/actions/fix-permissions

      - name: Parse inputs
        id: parse
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          "$PY" tests/src/inference/comfyui/scripts/create_config.py \
            --parse-inputs \
            --trigger "${{ github.event_name }}" \
            --models "${{ inputs.model_names || 'comfyui_stable_diffusion_2_1,comfyui_stable_diffusion_xl_base_1.0' }}" \
            --runner-label "${{ inputs.runner_label || 'self-hosted' }}" \
            --upload "${{ inputs.upload_results }}" \
            --config-file tests/src/inference/comfyui/config/models_config.yaml \
            --output-file "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          echo "## ComfyUI Validation Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trigger & Execution" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ steps.parse.outputs.trigger_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | \`baremetal\` (no Docker) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner Labels** | \`${{ steps.parse.outputs.runner_labels }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ComfyUI URL** | \`${{ inputs.comfyui_url || 'http://127.0.0.1:8188' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ComfyUI Path** | \`${{ inputs.comfyui_path || '$COMFYUI_PATH on runner' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ROCm Version** | \`${{ inputs.rocm_version || '(auto)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Torch wheel URL** | \`${{ inputs.torch_wheel_url || '(not set)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **torchvision wheel URL** | \`${{ inputs.torchvision_wheel_url || '(not set)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **torchaudio wheel URL** | \`${{ inputs.torchaudio_wheel_url || '(not set)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Label** | \`${{ inputs.execution_label || 'manual' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Upload to DB** | \`${{ steps.parse.outputs.upload_results }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Upload to Artifactory** | \`${{ inputs.upload_to_artifactory }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Jobs** | ${{ steps.parse.outputs.model_count }} tests × ${{ steps.parse.outputs.runner_label_count }} labels |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Models (${{ steps.parse.outputs.model_count }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Input:** \`${{ inputs.model_names || 'comfyui_stable_diffusion_2_1,comfyui_stable_diffusion_xl_base_1.0' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Selected Tests:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.parse.outputs.models }}' | "$PY" -c "import json,sys; [print(f'- \`{m}\`') for m in json.load(sys.stdin)]" >> $GITHUB_STEP_SUMMARY

  # ==================== VERIFY ENVIRONMENT ====================
  # One report per runner label: ROCm paths, TheRock tarball/commit, torch stack.
  # Compare runtime_environment.json across workflow runs to see build-to-build drift.
  verify-environment:
    name: "Verify environment (${{ matrix.runner_label }})"
    needs: setup
    runs-on: [self-hosted, '${{ matrix.runner_label }}']
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        runner_label: ${{ fromJson(needs.setup.outputs.runner_labels) }}

    env:
      COMFYUI_PATH: ${{ inputs.comfyui_path || vars.COMFYUI_PATH || '' }}
      COMFYUI_PYTHON: ${{ inputs.comfyui_python || vars.COMFYUI_PYTHON || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI shell
        uses: ./.github/actions/prepare-ci-shell

      - name: Setup test environment
        uses: ./.github/actions/setup-test-environment
        with:
          python-version: '3.x'
          gpu-family: ${{ vars.GPU_FAMILY || '' }}
          execution-label: ${{ inputs.execution_label || github.event_name }}

      - name: Load ROCm from metadata
        uses: ./.github/actions/load-rocm-from-metadata

      - name: Setup ROCm environment
        uses: ./.github/actions/setup-rocm-env
        with:
          enable-rocm-path: 'true'
          enable-hip-path: 'true'
          enable-ld-library-path: 'true'
          enable-hip-platform: 'true'

      - name: Capture runtime environment
        run: |
          set -euo pipefail
          mkdir -p logs
          source .github/scripts/comfyui-ci-env.sh
          resolve_comfyui_env
          PY="${COMFYUI_PYTHON:-${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}}"

          DRIFT_ARGS=()
          EXPECTED='${{ inputs.rocm_version }}'
          if [ -n "$EXPECTED" ]; then
            DRIFT_ARGS+=(--expected-rocm "$EXPECTED" --fail-on-drift)
          fi
          TORCH_URL='${{ inputs.torch_wheel_url }}'
          VISION_URL='${{ inputs.torchvision_wheel_url }}'
          AUDIO_URL='${{ inputs.torchaudio_wheel_url }}'
          [ -n "$TORCH_URL" ] && DRIFT_ARGS+=(--expected-torch-url "$TORCH_URL")
          [ -n "$VISION_URL" ] && DRIFT_ARGS+=(--expected-torchvision-url "$VISION_URL")
          [ -n "$AUDIO_URL" ] && DRIFT_ARGS+=(--expected-torchaudio-url "$AUDIO_URL")
          if [ -n "$TORCH_URL" ] || [ -n "$VISION_URL" ] || [ -n "$AUDIO_URL" ]; then
            DRIFT_ARGS+=(--fail-on-wheel-drift)
          fi

          "$PY" scripts/capture_runtime_environment.py \
            --python "$PY" \
            --output logs/runtime_environment.json \
            --markdown logs/runtime_environment.md \
            "${DRIFT_ARGS[@]}"

      - name: Publish environment report
        if: always()
        run: |
          if [ -f logs/runtime_environment.md ]; then
            cat logs/runtime_environment.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload environment report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: environment-${{ matrix.runner_label }}-${{ github.run_id }}
          path: |
            logs/runtime_environment.json
            logs/runtime_environment.md
          if-no-files-found: warn

  # ==================== PREFETCH ====================
  prefetch:
    name: "Prefetch (${{ matrix.runner_label }})"
    needs: setup
    runs-on: [self-hosted, '${{ matrix.runner_label }}']
    timeout-minutes: 1080

    strategy:
      fail-fast: false
      matrix:
        runner_label: ${{ fromJson(needs.setup.outputs.runner_labels) }}

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      AUTO_FETCH_MODELS: "true"
      COMFYUI_PREFER_ARTIFACTORY: "true"
      ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL || 'https://compute-artifactory.amd.com' }}
      COMFYUI_MODELS_ARTIFACTORY_REPO: ${{ vars.COMFYUI_MODELS_ARTIFACTORY_REPO || 'artifactory/rocm-qa-model-cache/comfyui' }}
      ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
      ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
      COMFYUI_PATH: ${{ inputs.comfyui_path || vars.COMFYUI_PATH || '' }}
      COMFYUI_PYTHON: ${{ inputs.comfyui_python || vars.COMFYUI_PYTHON || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI shell
        uses: ./.github/actions/prepare-ci-shell

      - name: Setup test environment
        uses: ./.github/actions/setup-test-environment
        with:
          python-version: '3.x'
          gpu-family: ${{ vars.GPU_FAMILY || '' }}
          execution-label: ${{ inputs.execution_label || github.event_name }}

      - name: Resolve ComfyUI environment
        run: |
          source .github/scripts/comfyui-ci-env.sh
          resolve_comfyui_env

      - name: Prefetch models and workflow inputs
        run: |
          set -euo pipefail
          PY="${COMFYUI_PYTHON:-${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}}"
          "$PY" -m pip install -q -r requirements.txt
          "$PY" tests/src/inference/comfyui/scripts/prefetch_models.py \
            --models-json '${{ needs.setup.outputs.models }}'

      - name: Prefetch summary
        if: always()
        run: |
          echo "## Model and workflow input prefetch (${{ matrix.runner_label }})" >> $GITHUB_STEP_SUMMARY
          echo "ComfyUI path: \`${COMFYUI_PATH:-unknown}\`" >> $GITHUB_STEP_SUMMARY

  # ==================== BENCHMARK ====================
  benchmark:
    name: "${{ matrix.runner_label }} / ${{ matrix.model }}"
    needs: [setup, prefetch, verify-environment]
    runs-on: [self-hosted, '${{ matrix.runner_label }}']
    timeout-minutes: 1080

    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.setup.outputs.models) }}
        runner_label: ${{ fromJson(needs.setup.outputs.runner_labels) }}

    env:
      GPU_FAMILY: ${{ vars.GPU_FAMILY || '' }}
      EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}
      CI: true
      DATABASE_UPLOAD_RESULTS: ${{ needs.setup.outputs.upload_results }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      AUTO_FETCH_MODELS: "true"
      COMFYUI_PREFER_ARTIFACTORY: "true"
      ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL || 'https://compute-artifactory.amd.com' }}
      COMFYUI_MODELS_ARTIFACTORY_REPO: ${{ vars.COMFYUI_MODELS_ARTIFACTORY_REPO || 'artifactory/rocm-qa-model-cache/comfyui' }}
      ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
      ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
      COMFYUI_MODEL_NAME: ${{ matrix.model }}
      COMFYUI_PATH: ${{ inputs.comfyui_path || vars.COMFYUI_PATH || '' }}
      COMFYUI_PYTHON: ${{ inputs.comfyui_python || vars.COMFYUI_PYTHON || '' }}
      UPLOAD_TO_ARTIFACTORY: ${{ inputs.upload_to_artifactory || false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI shell
        uses: ./.github/actions/prepare-ci-shell

      - name: Clean workspace
        uses: ./.github/actions/fix-permissions
        with:
          paths: '${{ github.workspace }}'
          clean_paths: 'logs results'

      - name: Setup test environment
        uses: ./.github/actions/setup-test-environment
        with:
          python-version: '3.x'
          gpu-family: ${{ vars.GPU_FAMILY || '' }}
          execution-label: ${{ env.EXECUTION_LABEL }}

      - name: Capture host config
        uses: ./.github/actions/capture-host-info

      # Same ROCm env bootstrap as qa-forge rocm-func-core-therock-install.yml
      # (load-rocm-from-metadata + setup-rocm-env after install).
      - name: Setup ROCm environment
        uses: ./.github/actions/setup-rocm-env
        with:
          enable-rocm-path: 'true'
          enable-hip-path: 'true'
          enable-ld-library-path: 'true'
          enable-hip-platform: 'true'

      - name: Detect ROCm version
        id: rocm_detect
        run: |
          set -euo pipefail
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          ROCM_VER="${{ inputs.rocm_version }}"

          _read_meta_key() {
            local file="$1" key="$2"
            grep -E "^${key}[[:space:]]*=" "$file" 2>/dev/null \
              | sed 's/^[^=]*=[[:space:]]*//' | tr -d ' \r' | head -1
          }

          # Linux: /etc/rocm_metadata.conf written by ROCmTest/TheRock install
          if [ -z "$ROCM_VER" ] && [ -f /etc/rocm_metadata.conf ]; then
            INSTALLED="$(_read_meta_key /etc/rocm_metadata.conf INSTALLED_VERSION || true)"
            if [ -n "$INSTALLED" ]; then
              ROCM_VER="${INSTALLED%%-*}"
              echo "ROCm version from /etc/rocm_metadata.conf: $ROCM_VER (full: $INSTALLED)"
            fi
            GFX_TARGET="$(_read_meta_key /etc/rocm_metadata.conf INSTALLED_GFX_TARGET || true)"
            if [ -n "$GFX_TARGET" ]; then
              echo "INSTALLED_GFX_TARGET=$GFX_TARGET" >> "$GITHUB_ENV"
            fi
          fi

          # Windows: TheRock metadata.conf
          if [ -z "$ROCM_VER" ]; then
            for meta in "/c/TheRock/build/metadata.conf" /c/TheRock/rocm-*/metadata.conf; do
              if [ -f "$meta" ]; then
                INSTALLED="$(_read_meta_key "$meta" INSTALLED_VERSION || true)"
                if [ -n "$INSTALLED" ]; then
                  ROCM_VER="${INSTALLED%%-*}"
                  echo "ROCm version from ${meta}: $ROCM_VER (full: $INSTALLED)"
                  break
                fi
              fi
            done
          fi

          # Fallback: host capture (logs/bm_config.json from capture-host-info)
          if { [ -z "$ROCM_VER" ] || [ "$ROCM_VER" = "Unknown" ]; } && [ -f logs/bm_config.json ]; then
            ROCM_VER=$("$PY" -c "import json; d=json.load(open('logs/bm_config.json')); print((d.get('rocm_version') or '').strip())" 2>/dev/null || true)
            [ -n "$ROCM_VER" ] && echo "ROCm version from logs/bm_config.json: $ROCM_VER"
          fi

          # Fallback: fleet ROCmDetector ($ROCM_PATH/.info/version-rocm, amd-smi, rocminfo)
          if [ -z "$ROCM_VER" ] || [ "$ROCM_VER" = "Unknown" ]; then
            ROCM_VER=$("$PY" -c "
          from tests.utils.system.rocm_detector import ROCmDetector
          v = ROCmDetector._detect_rocm_version() or ''
          print(v.split('-')[0] if v else '')
          " 2>/dev/null || true)
            [ -n "$ROCM_VER" ] && echo "ROCm version from ROCmDetector: $ROCM_VER"
          fi

          if [ -z "$ROCM_VER" ]; then
            echo "::warning::Could not detect ROCm version; using 'unknown'"
            ROCM_VER="unknown"
          fi

          echo "rocm_version=$ROCM_VER" >> "$GITHUB_OUTPUT"
          echo "ROCM_VERSION=$ROCM_VER" >> "$GITHUB_ENV"

      - name: Job info
        id: info
        uses: ./.github/actions/job-info
        with:
          model: ${{ matrix.model }}
          runner_label: ${{ matrix.runner_label }}
          execution_mode: baremetal

      - name: Detect GPU arch
        id: arch_detect
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          "$PY" tests/src/inference/comfyui/scripts/create_config.py \
            --detect-gpu-arch \
            --output-file "$GITHUB_OUTPUT"

      - name: Run ComfyUI validation
        run: |
          set -euo pipefail
          mkdir -p logs/benchmark_results

          source .github/scripts/comfyui-ci-env.sh
          resolve_comfyui_env
          PY="${COMFYUI_PYTHON:-${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}}"
          echo "ComfyUI URL: ${{ inputs.comfyui_url }}"

          "$PY" -m pip install -q -r requirements.txt

          ARCH_ARGS=()
          GPU_ARCH='${{ steps.arch_detect.outputs.gpu_arch }}'
          if [ -z "$GPU_ARCH" ] || [ "$GPU_ARCH" = "unknown" ]; then
            GPU_ARCH="${INSTALLED_GFX_TARGET:-}"
          fi
          if [ -n "$GPU_ARCH" ] && [ "$GPU_ARCH" != "unknown" ]; then
            ARCH_ARGS=(--arch "$GPU_ARCH")
            echo "Using GPU arch: $GPU_ARCH"
          fi

          ROCM_VER='${{ steps.rocm_detect.outputs.rocm_version }}'
          echo "Using ROCm version: $ROCM_VER"

          OS_VER="linux"
          UNAME_S="$(uname -s 2>/dev/null || echo unknown)"
          if [[ "$UNAME_S" == *MINGW* ]] || [[ "$UNAME_S" == *MSYS* ]] || [[ -d /c/TheRock ]] || [[ -d /c/Windows ]]; then
            OS_VER="windows"
          fi
          echo "Using OS version: $OS_VER"

          set +e
          "$PY" tests/src/inference/comfyui/comfyui_benchmark.py \
            --model '${{ matrix.model }}' \
            --rocm-version "$ROCM_VER" \
            --os-version "$OS_VER" \
            --comfyui-url '${{ inputs.comfyui_url }}' \
            --execution-label "${EXECUTION_LABEL}" \
            --results-dir logs/benchmark_results \
            "${ARCH_ARGS[@]}" \
            2>&1 | tee logs/console_output.log
          BENCHMARK_EXIT=${PIPESTATUS[0]}
          set -e

          # Runtime env snapshot (ComfyUI venv / host Python) for RASTRA payload.
          "$PY" scripts/capture_system_info.py \
            --output logs/container_info.json --packages --pip-list 2>/dev/null || \
            "$PY" scripts/capture_system_info.py \
            --output logs/container_info.json --packages --pip-list 2>/dev/null || true

          echo "BENCHMARK_EXIT_CODE=$BENCHMARK_EXIT" >> "$GITHUB_ENV"
          exit $BENCHMARK_EXIT

      - name: Generate model summary
        if: always()
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          "$PY" tests/src/inference/comfyui/scripts/generate_summary.py --mode github
        env:
          RUNNER_HOSTNAME: ${{ env.RUNNER_HOST }}
          COMFYUI_MODEL_NAME: ${{ matrix.model }}

      - name: Print execution summary
        if: always()
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          "$PY" tests/src/inference/comfyui/scripts/print_execution_summary.py \
            --results-dir logs/benchmark_results \
            --logs-dir logs
        env:
          RUNNER_HOSTNAME: ${{ env.RUNNER_HOST }}
          ROCM_VERSION: ${{ steps.rocm_detect.outputs.rocm_version }}

      - name: Upload results to database
        if: always() && needs.setup.outputs.upload_results == 'true'
        env:
          API_URL: ${{ vars.RASTRA_API_URL }}
          API_KEY: ${{ secrets.RASTRA_API_KEY }}
          EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}
          RUNNER_HOSTNAME: ${{ env.RUNNER_HOST }}
          GITHUB_ACTOR: ${{ github.actor }}
          COMFYUI_MODEL_NAME: ${{ matrix.model }}
          BENCHMARK_EXIT_CODE: ${{ env.BENCHMARK_EXIT_CODE }}
          ROCM_VERSION: ${{ steps.rocm_detect.outputs.rocm_version }}
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          "$PY" -m pip install -q requests jsonschema packaging pyyaml
          "$PY" tests/src/inference/comfyui/scripts/upload_from_artifacts.py \
            --results-dir logs/benchmark_results \
            --execution-label "$EXECUTION_LABEL" \
            || echo "DB upload skipped or failed (non-critical)"

      - name: Upload to Artifactory
        if: always() && env.UPLOAD_TO_ARTIFACTORY == 'true'
        uses: ./.github/actions/upload-to-artifactory
        with:
          source_path: logs/
          framework: comfyui
          test_name: ${{ matrix.model }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}
          enabled: ${{ env.UPLOAD_TO_ARTIFACTORY }}

      - name: Upload artifacts
        if: always()
        uses: ./.github/actions/upload-artifacts
        with:
          name_prefix: 'results'
          runner_label: ${{ matrix.runner_label }}
          model_slug: ${{ env.MODEL_SLUG }}

      - name: Fix permissions
        if: always()
        uses: ./.github/actions/fix-permissions
        with:
          paths: '${{ github.workspace }}'

  # ==================== CONSOLIDATE ====================
  consolidate:
    name: "Consolidate"
    needs: [setup, benchmark]
    runs-on: [self-hosted, Linux]
    if: always()

    env:
      EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI shell
        uses: ./.github/actions/prepare-ci-shell

      - name: Install deps
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          "$PY" -m pip install -q prettytable pyyaml requests jsonschema packaging

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_results
          pattern: results__*

      - name: Consolidate results
        id: consolidate
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          "$PY" tests/src/inference/comfyui/scripts/consolidate_artifacts.py \
            --results-dir all_results \
            --output results_summary.md \
            --fail-on-error

      - name: Print execution summary
        if: always()
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          "$PY" tests/src/inference/comfyui/scripts/print_execution_summary.py \
            --results-dir all_results \
            --logs-dir all_results

      - name: Add to summary
        if: always()
        run: |
          if [ -f "results_summary.md" ]; then
            cat results_summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## No results to consolidate" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results to database
        if: needs.setup.outputs.upload_results == 'true'
        env:
          API_URL: ${{ vars.RASTRA_API_URL }}
          API_KEY: ${{ secrets.RASTRA_API_KEY }}
          EXECUTION_LABEL: ${{ inputs.execution_label || github.event_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          "$PY" tests/src/inference/comfyui/scripts/upload_from_artifacts.py \
            --results-dir all_results \
            --execution-label "$EXECUTION_LABEL" \
            --save-payload fallback_payload.json \
            || echo "Fallback DB upload skipped or failed (non-critical)"

      - name: Generate RASTRA link
        if: always()
        run: |
          PY="${CI_PYTHON:-$(command -v python3 2>/dev/null || command -v python)}"
          PAYLOAD=$(find all_results -name "payload.json" -type f | head -1)
          if [ -z "$PAYLOAD" ] && [ -f "fallback_payload.json" ]; then
            PAYLOAD="fallback_payload.json"
          fi
          if [ -n "$PAYLOAD" ]; then
            "$PY" tests/utils/results/rastra_link.py \
              --from-payload "$PAYLOAD" \
              --append-summary \
              --title "View Results in RASTRA Dashboard"
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "**RASTRA Link:** Not available (DB upload disabled or no results)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload consolidated
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-${{ github.run_id }}
          path: |
            results_summary.md
            fallback_payload.json
          retention-days: 90

  # ==================== SUMMARY ====================
  summary:
    name: "Done"
    needs: [setup, benchmark, consolidate]
    runs-on: [self-hosted, Linux]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI shell
        uses: ./.github/actions/prepare-ci-shell

      - name: Final
        run: |
          echo "## ComfyUI Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download \`consolidated-${{ github.run_id }}\` artifact for full results." >> $GITHUB_STEP_SUMMARY
