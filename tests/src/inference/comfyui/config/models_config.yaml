# ComfyUI validation suite config (framework-ci suite style).
# DERIVED from config/suite_manifest.json via scripts/create_config.py.
# The manifest stays authoritative; this is the fleet-facing view.
# CI selects tests by comma-separated test_name list (fleet workflow_id style).
tests:
  - name: "comfyui_stable_diffusion_xl_base_1.0"
    tms_key: "1002335"
    tags: ["smoke", "sdxl", "regression"]
    os: ["linux", "windows"]
    timeout_minutes: 20
    expected_output_type: "image"
    enabled: true
